name: "freq-ai"
description: "Run freq-ai tasks against a repository from GitHub Actions."
author: "geoffsee"
branding:
  icon: "git-merge"
  color: "purple"

inputs:
  task:
    description: "freq-ai subcommand to run (for example: housekeeping, backlog-curation, ideation, sprint-planning, code-review, issue, loop)."
    required: true
  args:
    description: "Positional arguments for tasks that need them (e.g. PR number for fix-pr, issue number for issue, tracker for loop)."
    required: false
    default: ""
  agent:
    description: "Which agent CLI to drive (claude, cline, codex, copilot, gemini, grok, junie, xai, cursor). The matching CLI must already be installed and authenticated on the runner."
    required: false
    default: "claude"
  version:
    description: "freq-ai release tag to install. Use 'latest' to resolve the most recent release."
    required: false
    default: "latest"
  auto:
    description: "Pass --auto to freq-ai. Reduces adapter permission prompts and, for two-phase workflows (ideation, housekeeping, sprint-planning, retrospective, etc.), synthesizes stand-in feedback so the draft chains straight into finalize. Defaults to true because Actions runs are non-interactive."
    required: false
    default: "true"
  dry-run:
    description: "Pass --dry-run to freq-ai (print intended actions without executing)."
    required: false
    default: "false"
  preset:
    description: "Workflow preset to use (overrides workflow_preset in freq-ai.toml). Empty = use the project's configured preset."
    required: false
    default: ""
  working-directory:
    description: "Directory to run freq-ai in. Defaults to the repository root checked out by actions/checkout."
    required: false
    default: ""
  configure-git:
    description: "Configure git user.name/user.email as github-actions[bot] before running. Disable if you handle git identity yourself."
    required: false
    default: "true"
  github-token:
    description: "Token exposed to freq-ai as GH_TOKEN for gh CLI calls. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

outputs:
  exit-code:
    description: "Exit code returned by freq-ai."
  installed-version:
    description: "Version of freq-ai that was installed and executed."

runs:
  using: "node20"
  main: "dist/index.js"
